tasks.register('packageMacPortableTar', Tar) {
	group = 'distribution'
	description = 'Builds a tar.gz archive for the macOS portable package.'
	dependsOn tasks.named('prepareMacPortable')
	archiveFileName = "aurora-macos-${project.version}.tar.gz"
	compression = Compression.GZIP
	destinationDirectory = layout.buildDirectory.dir('distributions')
	from(macosDistDir) {
		into 'Aurora'
	}
}
