name: Release Portable Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 1.26.1
        required: true
        default: "1.26.1"
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            prepare_task: prepareWindowsPortable
            dist_dir: build/windows-dist/Aurora
            asset_name: aurora-windows
            archive_ext: zip
          - os: ubuntu-latest
            platform: linux
            prepare_task: prepareLinuxPortable
            dist_dir: build/linux-dist/Aurora
            asset_name: aurora-linux
            archive_ext: tar.gz
          - os: macos-latest
            platform: macos
            prepare_task: prepareMacPortable
            dist_dir: build/macos-dist/Aurora
            asset_name: aurora-macos
            archive_ext: tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Resolve release version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          fi

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Prepare portable directory on Windows
        if: matrix.platform == 'windows'
        shell: pwsh
        run: .\gradlew.bat "-PreleaseVersion=$env:RELEASE_VERSION" ${{ matrix.prepare_task }}

      - name: Prepare portable directory on Unix
        if: matrix.platform != 'windows'
        shell: bash
        run: ./gradlew "-PreleaseVersion=$RELEASE_VERSION" ${{ matrix.prepare_task }}

      - name: Build Windows runtime
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $jarFile = (Resolve-Path "${{ matrix.dist_dir }}\app\aurora.jar").Path
          $workDir = Join-Path $PWD "build\jlink-work"
          $runtimeDir = "${{ matrix.dist_dir }}\app\runtime"
          $availableModules = Get-ChildItem "$env:JAVA_HOME\jmods" -Filter *.jmod | ForEach-Object { $_.BaseName }
          $extraModules = @("java.naming", "java.sql", "java.xml", "jdk.crypto.ec")

          if (Test-Path $workDir) {
            Remove-Item -Path $workDir -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $workDir | Out-Null

          Push-Location $workDir
          & "$env:JAVA_HOME\bin\jar.exe" xf $jarFile
          $detectedModules = & "$env:JAVA_HOME\bin\jdeps.exe" --ignore-missing-deps --multi-release 21 --print-module-deps --recursive --class-path "BOOT-INF/lib/*" BOOT-INF/classes
          Pop-Location

          $moduleList = (($detectedModules -split ',') + $extraModules) `
            | ForEach-Object { $_.Trim() } `
            | Where-Object { $_ -and ($availableModules -contains $_) } `
            | Sort-Object -Unique

          Write-Host ("Windows jlink modules: {0}" -f ([string]::Join(',', $moduleList)))

          if (Test-Path $runtimeDir) {
            Remove-Item -Path $runtimeDir -Recurse -Force
          }

          & "$env:JAVA_HOME\bin\jlink.exe" `
            --add-modules ([string]::Join(',', $moduleList)) `
            --strip-debug `
            --no-header-files `
            --no-man-pages `
            --compress=zip-6 `
            --output $runtimeDir

          Get-ChildItem $runtimeDir -Recurse | Measure-Object -Property Length -Sum | ForEach-Object {
            Write-Host ("Windows runtime size: {0:N2} MB" -f ($_.Sum / 1MB))
          }

      - name: Build Unix runtime
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          JAR_FILE="${{ matrix.dist_dir }}/app/aurora.jar"
          WORK_DIR="build/jlink-work"
          RUNTIME_DIR="${{ matrix.dist_dir }}/app/runtime"

          rm -rf "$WORK_DIR"
          mkdir -p "$WORK_DIR"
          (
            cd "$WORK_DIR"
            "$JAVA_HOME/bin/jar" xf "$GITHUB_WORKSPACE/$JAR_FILE"
          )

          DETECTED_MODULES=$(
            cd "$WORK_DIR" && \
            "$JAVA_HOME/bin/jdeps" \
              --ignore-missing-deps \
              --multi-release 21 \
              --print-module-deps \
              --recursive \
              --class-path "BOOT-INF/lib/*" \
              BOOT-INF/classes
          )

          AVAILABLE_MODULES=$(find "$JAVA_HOME/jmods" -maxdepth 1 -name '*.jmod' -exec basename {} .jmod \;)
          MODULE_LIST=$(
            {
              printf '%s\n' "$DETECTED_MODULES" | tr ',' '\n'
              printf '%s\n' java.naming java.sql java.xml jdk.crypto.ec
            } \
              | sed '/^$/d' \
              | sort -u \
              | grep -Fx -f <(printf '%s\n' "$AVAILABLE_MODULES") \
              | tr '\n' ',' \
              | sed 's/,$//'
          )

          echo "Unix jlink modules: $MODULE_LIST"

          rm -rf "$RUNTIME_DIR"
          "$JAVA_HOME/bin/jlink" \
            --add-modules "$MODULE_LIST" \
            --strip-debug \
            --no-header-files \
            --no-man-pages \
            --compress=zip-6 \
            --output "$RUNTIME_DIR"

          du -sh "$RUNTIME_DIR"

      - name: Create Windows archive
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build/distributions | Out-Null
          if (Test-Path "build/distributions/${{ matrix.asset_name }}-$env:RELEASE_VERSION.${{ matrix.archive_ext }}") {
            Remove-Item "build/distributions/${{ matrix.asset_name }}-$env:RELEASE_VERSION.${{ matrix.archive_ext }}" -Force
          }
          Push-Location "build/windows-dist"
          Compress-Archive -Path "Aurora" -DestinationPath "../distributions/${{ matrix.asset_name }}-$env:RELEASE_VERSION.${{ matrix.archive_ext }}"
          Pop-Location

      - name: Create Unix archive
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          mkdir -p build/distributions
          tar -C "build/${{ matrix.platform }}-dist" -czf "build/distributions/${{ matrix.asset_name }}-$RELEASE_VERSION.${{ matrix.archive_ext }}" Aurora

      - name: Upload packaged asset
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}-${{ env.RELEASE_VERSION }}
          path: build/distributions/${{ matrix.asset_name }}-${{ env.RELEASE_VERSION }}.${{ matrix.archive_ext }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          fi

      - name: Download packaged artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          find release-assets -type f \( -name "*.zip" -o -name "*.tar.gz" \) -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            | sed 's#  release-assets/.*/#  #' > SHA256SUMS.txt

      - name: Generate release notes body
        shell: bash
        run: |
          cat > release-body.md <<EOF
          Aurora v${RELEASE_VERSION} 已发布。

          ## 包含内容
          - Windows 绿色包：\`aurora-windows-${RELEASE_VERSION}.zip\`
          - Linux 绿色包：\`aurora-linux-${RELEASE_VERSION}.tar.gz\`
          - macOS 绿色包：\`aurora-macos-${RELEASE_VERSION}.tar.gz\`
          - 校验文件：\`SHA256SUMS.txt\`

          ## 使用说明
          - 以上三个附件均已内置对应平台的 Java 21 运行时，下载后可直接解压使用。
          - Windows 版本建议双击 \`启动 Aurora.bat\`。
          - Linux 版本建议执行 \`./start-aurora.sh\`。
          - macOS 版本建议执行 \`./start-aurora.command\`。

          ## 升级建议
          1. 先停止旧版本 Aurora。
          2. 备份原有 \`data/aurora.db\`。
          3. 用新版本覆盖程序目录，保留原有 \`data/\` 和 \`logs/\`。
          4. 启动新版本并验证访问地址 \`http://localhost:8080\`。

          ## 附加文档
          - Windows 绿色包交付说明：[\`docs/windows-portable.md\`](https://github.com/${{ github.repository }}/blob/main/docs/windows-portable.md)
          - 跨平台绿色包发布说明：[\`docs/portable-release.md\`](https://github.com/${{ github.repository }}/blob/main/docs/portable-release.md)
          EOF

      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${RELEASE_VERSION}"
          TITLE="Aurora v${RELEASE_VERSION}"

          mapfile -t ASSETS < <(find release-assets -type f \( -name "*.zip" -o -name "*.tar.gz" \) | sort)
          ASSETS+=("SHA256SUMS.txt")

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE" --notes-file release-body.md
            gh release upload "$TAG" "${ASSETS[@]}" --clobber
          else
            gh release create "$TAG" "${ASSETS[@]}" \
              --title "$TITLE" \
              --target "${GITHUB_SHA}" \
              --notes-file release-body.md
          fi
