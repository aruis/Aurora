spring:
  datasource:
    url: jdbc:sqlite:./data/aurora.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
    open-in-view: false
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

server:
  port: 8080
  servlet:
    session:
      cookie:
        http-only: true

logging:
  file:
    name: ./logs/aurora.log

app:
  admin:
    bootstrap-password: admin123
    reset-on-startup: false
  cors:
    allowed-origins:
      - http://localhost:8080
      - http://127.0.0.1:8080
