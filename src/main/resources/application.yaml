spring:
  application:
    name: aurora
  datasource:
    # Windows example: jdbc:sqlite:C:/aurora/data/aurora.db
    # Demo example: jdbc:sqlite:./aurora-demo.db
    url: jdbc:sqlite:./aurora.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
        format_sql: true
    open-in-view: false
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

server:
  servlet:
    session:
      cookie:
        http-only: true

app:
  admin:
    bootstrap-password: admin123
    reset-on-startup: false
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
