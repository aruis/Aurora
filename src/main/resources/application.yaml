spring:
  application:
    name: aurora
  datasource:
    # Windows example: jdbc:sqlite:C:/aurora/data/aurora.db
    # Demo example: jdbc:sqlite:./aurora-demo.db
    url: jdbc:sqlite:./aurora.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
        format_sql: true
    open-in-view: false
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

server:
  port: 51889
  servlet:
    session:
      cookie:
        http-only: true

logging:
  file:
    name: ./logs/aurora.log
  logback:
    rollingpolicy:
      file-name-pattern: ./logs/aurora.%d{yyyy-MM-dd}.%i.log.gz
      max-file-size: 10MB
      max-history: 14
      total-size-cap: 500MB

app:
  admin:
    bootstrap-password: admin123
    reset-on-startup: false
  operation-log:
    retention-days: 30
  project-delete-archive:
    file: ./logs/project-delete-archive.log
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
