spring:
  datasource:
    url: jdbc:sqlite:./build/aurora-test.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
    open-in-view: false
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

app:
  operation-log:
    retention-days: 30
  project-delete-archive:
    file: ./build/project-delete-archive-test.log
  cors:
    allowed-origins:
      - http://localhost:5173
